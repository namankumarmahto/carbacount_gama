spring:
  datasource:
    url: jdbc:postgresql://localhost:5433/carbon_db
    username: postgres
    password: admin
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
    show-sql: true
  flyway:
    enabled: true
    locations: classpath:db/migration

server:
  port: 8081

jwt:
  secret: aVeryLongSecretKeyThatIsAtLeast32BytesLongForHS256AlgorithmToWorkProperlyReplaceInProd
  expiration: 86400000
